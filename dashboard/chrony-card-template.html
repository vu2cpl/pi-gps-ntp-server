<style>
.gpsntp-card {
  /* GitHub-dark palette — matches the rest of the VU2CPL shack dashboard */
  --bg:     #0d1117;
  --card:   #161b22;
  --border: #30363d;
  --text:   #c9d1d9;
  --strong: #e6edf3;
  --muted:  #8b949e;
  --accent: #58a6ff;
  --green:  #3fb950;
  --amber:  #e3b341;
  --red:    #f85149;

  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 100%;
  padding: 14px 16px;
  font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
  font-size: 13px;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  box-sizing: border-box;
}
.gpsntp-card .ttl {
  color: var(--strong);
  font-weight: 600;
  font-size: 14px;
  margin: 0 0 10px;
  letter-spacing: 0.02em;
}
.gpsntp-card .sect {
  color: var(--muted);
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  margin: 12px 0 8px;
  user-select: none;
}
.gpsntp-card .sect:before,
.gpsntp-card .sect:after {
  content: "\2014\2014\2014";
  color: var(--border);
  margin: 0 8px;
  letter-spacing: -1px;
}
.gpsntp-card .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.gpsntp-card .row:last-of-type { border-bottom: none; }
.gpsntp-card .lab {
  color: var(--text);
  font-size: 12.5px;
}
.gpsntp-card .val {
  color: var(--strong);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
  font-size: 12.5px;
}
.gpsntp-card .val.attn { color: var(--amber); }
.gpsntp-card .chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 1px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid currentColor;
  background: transparent;
  letter-spacing: 0.02em;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
  white-space: nowrap;
}
.gpsntp-card .chip.good { color: var(--green); }
.gpsntp-card .chip.info { color: var(--accent); }
.gpsntp-card .chip.warn { color: var(--amber); }
.gpsntp-card .chip.bad  { color: var(--red); }
.gpsntp-card .led {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  background: currentColor;
  box-shadow: 0 0 4px currentColor;
}
.gpsntp-card .gps-val {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--strong);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
  font-size: 12.5px;
}
.gpsntp-card .ftr {
  margin-top: 12px;
  padding-top: 9px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
  font-size: 11.5px;
  letter-spacing: 0.02em;
}
</style>

<div class="gpsntp-card">
  <h3 class="ttl">🛰 <span id="gpsntp-title">GPS Time Server</span></h3>

  <div class="sect">SYNC STATUS</div>

  <div class="row">
    <span class="lab">Reference</span>
    <span class="chip info" id="gpsntp-ref"><span class="led"></span><span class="t">—</span></span>
  </div>
  <div class="row">
    <span class="lab">Stratum</span>
    <span class="chip info" id="gpsntp-stratum"><span class="led"></span><span class="t">—</span></span>
  </div>
  <div class="row">
    <span class="lab">System offset</span>
    <span class="val" id="gpsntp-sys">—</span>
  </div>
  <div class="row">
    <span class="lab">RMS offset</span>
    <span class="val" id="gpsntp-rms">—</span>
  </div>
  <div class="row">
    <span class="lab">Root dispersion</span>
    <span class="val" id="gpsntp-rd">—</span>
  </div>
  <div class="row">
    <span class="lab">Skew</span>
    <span class="val" id="gpsntp-skew">—</span>
  </div>
  <div class="row">
    <span class="lab">Leap</span>
    <span class="val" id="gpsntp-leap">—</span>
  </div>
  <div class="row">
    <span class="lab">GPS</span>
    <span class="gps-val">
      <span class="chip info" id="gpsntp-fix"><span class="led"></span><span class="t">—</span></span>
      <span id="gpsntp-sats">—</span>
    </span>
  </div>

  <div class="ftr">
    <span id="gpsntp-utc">—</span>
    <span id="gpsntp-ago">—</span>
  </div>
</div>

<script>
(function(scope) {
  var DASH = '—';
  var lastTs = 0;

  function $(id)       { return document.getElementById(id); }
  function setText(id, txt) { var el = $(id); if (el) el.textContent = txt; }
  function setChip(id, txt, cls) {
    var el = $(id); if (!el) return;
    el.className = 'chip ' + cls;
    var t = el.querySelector('.t');
    if (t) t.textContent = txt;
  }
  function setVal(id, txt, attn) {
    var el = $(id); if (!el) return;
    el.textContent = txt;
    el.className = 'val' + (attn ? ' attn' : '');
  }

  function fmtSigned(v) {
    if (v === undefined || v === null) return DASH;
    var sign = v >= 0 ? '+' : '-';
    var a = Math.abs(v);
    if (a < 1e-6) return sign + Math.round(a * 1e9) + ' ns';
    if (a < 1e-3) return sign + (a * 1e6).toFixed(1) + ' µs';
    if (a < 1)    return sign + (a * 1e3).toFixed(2) + ' ms';
    return sign + a.toFixed(3) + ' s';
  }
  function fmtAbs(v) {
    if (v === undefined || v === null) return DASH;
    var a = Math.abs(v);
    if (a < 1e-6) return Math.round(a * 1e9) + ' ns';
    if (a < 1e-3) return (a * 1e6).toFixed(1) + ' µs';
    if (a < 1)    return (a * 1e3).toFixed(2) + ' ms';
    return a.toFixed(3) + ' s';
  }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function utcTime(ts) {
    if (!ts) return DASH;
    var d = new Date(ts * 1000);
    return pad2(d.getUTCHours()) + ':' + pad2(d.getUTCMinutes()) + ':' + pad2(d.getUTCSeconds()) + ' UTC';
  }
  function agoText(ts) {
    if (!ts) return DASH;
    var age = Math.max(0, Math.floor(Date.now() / 1000) - ts);
    if (age < 60)   return age + ' s ago';
    if (age < 3600) return Math.floor(age / 60) + ' m ago';
    return Math.floor(age / 3600) + ' h ago';
  }
  function classifyRef(ref) {
    if (ref === 'PPS' || ref === 'PPS2') return 'good';
    if (ref === 'NMEA' || ref === 'NMEB') return 'warn';
    return 'info';
  }
  function classifyStratum(s) {
    if (s === 1) return 'good';
    if (s >= 2 && s <= 15) return 'warn';
    return 'bad';
  }
  function classifyFix(m) {
    if (m === 3) return 'good';
    if (m === 2) return 'warn';
    return 'bad';
  }

  function render(p) {
    var sys = p.system_time_offset_s || 0;
    var rms = p.rms_offset_s         || 0;
    var rd  = p.root_dispersion_s    || 0;
    var sk  = p.skew_ppm             || 0;
    lastTs  = p.ts || 0;

    setChip('gpsntp-ref',     p.ref_name || DASH,                       classifyRef(p.ref_name));
    setChip('gpsntp-stratum', (p.stratum === undefined ? DASH : p.stratum), classifyStratum(p.stratum));
    setVal ('gpsntp-sys',     fmtSigned(sys),         Math.abs(sys) > 1e-3);
    setVal ('gpsntp-rms',     fmtAbs(rms),            rms > 1e-3);
    setVal ('gpsntp-rd',      fmtAbs(rd),             rd  > 5e-3);
    setVal ('gpsntp-skew',    sk.toFixed(3) + ' ppm', Math.abs(sk) > 1);
    setText('gpsntp-leap',    p.leap || DASH);

    var fixText = p.fix_mode === 3 ? '3D'
                : p.fix_mode === 2 ? '2D'
                : 'no fix';
    setChip('gpsntp-fix', fixText, classifyFix(p.fix_mode));
    setText('gpsntp-sats',
      (p.sat_used === undefined ? DASH : p.sat_used) + ' / ' +
      (p.sat_seen === undefined ? DASH : p.sat_seen));

    setText('gpsntp-utc', utcTime(lastTs));
    setText('gpsntp-ago', agoText(lastTs));
  }

  scope.$watch('msg', function(msg) {
    if (!msg || !msg.payload) return;
    render(msg.payload);
  });

  if (!scope._gpsntpTicker) {
    scope._gpsntpTicker = setInterval(function() {
      if (lastTs) setText('gpsntp-ago', agoText(lastTs));
    }, 5000);
    scope.$on('$destroy', function() {
      clearInterval(scope._gpsntpTicker);
      scope._gpsntpTicker = null;
    });
  }
})(scope);
</script>
